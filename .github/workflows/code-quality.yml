name: Code Quality

on:
  pull_request:
    branches: [ "master", "main", "develop" ]
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8 mypy black isort

      - name: Run Ruff (fast linting)
        run: ruff check src/ --output-format=github

      - name: Run Flake8 (strict linting)
        run: |
          flake8 src/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exit-zero

      - name: Run Black (formatting check)
        run: black --check src/ || echo "Formatting issues found"

      - name: Run isort (import sorting check)
        run: isort --check-only src/ || echo "Import sorting issues found"

      - name: Run MyPy (type checking)
        run: mypy src/ --ignore-missing-imports --no-error-summary || echo "Type checking issues found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: code-quality-report
          path: |
            *.txt
            *.log
